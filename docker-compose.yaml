# ============================================================
# AI Data Pipeline Incident Investigator
# Docker Compose — Airflow 3.1.7 + pgvector + dbt + Agent
# ============================================================
# Based on the official Airflow 3.1.7 docker-compose.yaml,
# adapted for this project:
#   - pgvector/pgvector:pg16 instead of postgres:16
#   - LocalExecutor (no Redis/Celery — simpler for POC)
#   - Three databases: airflow (default), pipeline_db, investigator_db
#   - Custom services: dbt-runner, investigator-api
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down -v        # Stop and remove volumes
#   docker compose logs -f        # Follow all logs
#   docker compose up --build     # Rebuild custom images
# ============================================================

x-airflow-common:
  #image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.1.7}
  # To add custom dependencies, uncomment "build" and comment "image":
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment:
    # -- Core --
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    # -- for dbt profiles --
    POSTGRES_HOST: postgres
    POSTGRES_PORT: '5432'
    POSTGRES_USER: airflow
    POSTGRES_PASSWORD: airflow
    PIPELINE_DB: pipeline_db
    DBT_PROFILES_DIR: /dbt
    # -- Database --
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    # -- Scheduler --
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # -- Quick dev additions (use custom image for production) --
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    # -- Custom config file --
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    # -- Pipeline DB connection (available to DAGs) --
    PIPELINE_DB_CONN: postgresql+psycopg2://airflow:airflow@postgres/pipeline_db
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/airflow/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/airflow/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/airflow/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/airflow/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/dbt_project:/dbt
    - ${AIRFLOW_PROJ_DIR:-.}/dbt_project/seeds:/data/seeds
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  # ────────────────────────────────────────────────────────────
  # PostgreSQL + pgvector
  # Single instance, three databases:
  #   airflow (default) — Airflow metadata
  #   pipeline_db       — Sales pipeline data (bronze/silver/gold)
  #   investigator_db   — Incident records + vector embeddings
  # ────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./sql/init_db.sql:/docker-entrypoint-initdb.d/01-init_db.sql
      - ./sql/seed_data.sql:/docker-entrypoint-initdb.d/02-seed_data.sql
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ────────────────────────────────────────────────────────────
  # Airflow API Server (replaces webserver in Airflow 3)
  # Serves the UI + REST API on port 8080
  # ────────────────────────────────────────────────────────────
  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/api/v2/version" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ────────────────────────────────────────────────────────────
  # Airflow Scheduler
  # Schedules tasks, executes with LocalExecutor
  # ────────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8974/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ────────────────────────────────────────────────────────────
  # Airflow DAG Processor
  # Parses DAG files in a separate process for stability
  # ────────────────────────────────────────────────────────────
  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: [ "CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"' ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ────────────────────────────────────────────────────────────
  # Airflow Triggerer
  # Handles deferred/async tasks
  # ────────────────────────────────────────────────────────────
  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: [ "CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"' ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ────────────────────────────────────────────────────────────
  # Airflow Init
  # One-time setup: resource checks, DB migration, admin user
  # ────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "$${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING: AIRFLOW_UID not set!\e[0m"
          echo "On Linux, set AIRFLOW_UID to avoid file permission issues."
          echo "  echo -e \"AIRFLOW_UID=$$(id -u)\" >> .env"
          echo
          export AIRFLOW_UID=$$(id -u)
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo
          echo -e "\033[1;33mWARNING: Not enough memory for Docker.\e[0m"
          echo "At least 4GB required. You have $$(numfmt --to iec $$((mem_available * one_meg)))"
          echo
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo
          echo -e "\033[1;33mWARNING: Not enough CPUs for Docker.\e[0m"
          echo "At least 2 CPUs recommended. You have $${cpus_available}"
          echo
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo
          echo -e "\033[1;33mWARNING: Not enough disk space for Docker.\e[0m"
          echo "At least 10GB recommended. You have $$(numfmt --to iec $$((disk_available * 1024)))"
          echo
          warning_resources="true"
        fi
        if [[ $${warning_resources} == "true" ]]; then
          echo
          echo -e "\033[1;33mWARNING: Insufficient resources (see above)!\e[0m"
          echo "See: https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#before-you-begin"
          echo
        fi
        echo
        echo "Creating missing opt dirs:"
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Airflow version:"
        /entrypoint airflow version
        echo
        echo "Running airflow config list to create default config..."
        /entrypoint airflow config list >/dev/null
        echo
        echo "Setting ownership to $${AIRFLOW_UID}:0"
        chown -R "$${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Airflow init complete."
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    restart: "no"

  # ────────────────────────────────────────────────────────────
  # Airflow CLI (debug profile — only runs when requested)
  # Usage: docker compose run airflow-cli airflow dags list
  # ────────────────────────────────────────────────────────────
  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on

  # ────────────────────────────────────────────────────────────
  # dbt Runner
  # Runs dbt commands against pipeline_db
  # Airflow DAG tasks call dbt via BashOperator
  # ────────────────────────────────────────────────────────────
  dbt-runner:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    environment:
      DBT_PROFILES_DIR: /dbt
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      PIPELINE_DB: pipeline_db
    volumes:
      - ./dbt_project:/dbt
      - ./dbt_project/seeds:/data/seeds
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────
  # Investigator API (LangGraph Agent + CLI Backend)
  # Runs investigations triggered by Airflow callbacks or CLI
  # ────────────────────────────────────────────────────────────
  investigator-api:
    build:
      context: .
      dockerfile: Dockerfile.agent
    environment:
      # -- OpenAI --
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # -- LangSmith Observability --
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-pipeline-investigator}
      # -- Database connections --
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      PIPELINE_DB: pipeline_db
      INVESTIGATOR_DB: investigator_db
      # -- Airflow API --
      AIRFLOW_API_URL: http://airflow-apiserver:8080
      AIRFLOW_API_USER: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      AIRFLOW_API_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    ports:
      - "8000:8000"
    volumes:
      - ./agent:/app/agent
      - ./cli:/app/cli
      - ./dbt_project:/dbt:ro
    depends_on:
      postgres:
        condition: service_healthy
      airflow-apiserver:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-db-volume:
